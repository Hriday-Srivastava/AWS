AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: ordersapi
Resources:
  CreateOrderFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: CreateOrderFunction
      Handler: lambda.apis.CreateOrderLambda::createOrder
      Runtime: java17
      Architectures:
      - x86_64
      MemorySize: 512
      Events:
        OrderEvents:
          Type: Api
          Properties:
            Path: /orders
            Method: POST
    Metadata:
      SamResourceId: CreateOrderFunction
  RetrieveOrderFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: RetrieveOrderFunction
      Handler: lambda.apis.RetrieveOrderLambda::RetrieveOrder
      Runtime: java17
      Architectures:
      - x86_64
      MemorySize: 512
      Events:
        OrderEvents:
          Type: Api
          Properties:
            Path: /orders
            Method: GET
    Metadata:
      SamResourceId: RetrieveOrderFunction
